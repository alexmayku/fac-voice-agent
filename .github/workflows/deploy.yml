name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/my-frontend:latest
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-agent:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/my-agent:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/my-frontend my-frontend=${{ secrets.DOCKERHUB_USERNAME }}/my-frontend:${{ github.sha }} --namespace coach-app
          kubectl set image deployment/my-agent my-agent=${{ secrets.DOCKERHUB_USERNAME }}/my-agent:${{ github.sha }} --namespace coach-app
          kubectl apply -f k8s/db-pvc.yml --namespace coach-app
          kubectl apply -f k8s/db-deployment.yml --namespace coach-app
          kubectl apply -f k8s/db-service.yml --namespace coach-app
          kubectl apply -f k8s/email-cronjob.yml --namespace coach-app
          kubectl rollout status deployment/my-frontend --namespace coach-app --timeout=120s
          kubectl rollout status deployment/my-agent --namespace coach-app --timeout=120s
