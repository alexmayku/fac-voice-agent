apiVersion: batch/v1
kind: CronJob
metadata:
  name: monday-planning-email
  namespace: coach-app
spec:
  schedule: "0,30 7-10 * * 1"
  timeZone: "Europe/London"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: curl
              image: curlimages/curl:latest
              command:
                - sh
                - -c
                - |
                  TIME=$(TZ=Europe/London date +%H:%M)
                  curl -fsS \
                    -H "Authorization: Bearer ${CRON_SECRET}" \
                    "http://my-frontend.coach-app.svc:80/api/cron/send-invitations?mode=planning&time=${TIME}"
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: coach-app-secrets
                      key: CRON_SECRET
                - name: TZ
                  value: "Europe/London"
---
